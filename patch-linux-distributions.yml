---
- name: Patch different Linux distributions
  hosts: all
  become: yes
  vars:
    patch_reboot: false
  
  tasks:
    - name: Gather OS facts
      setup:
        gather_subset: distribution

    - name: Update package cache and patch RedHat/CentOS/Fedora
      yum:
        name: '*'
        state: latest
        update_cache: yes
      when: ansible_os_family == "RedHat"
      register: yum_update

    - name: Update package cache and patch Debian/Ubuntu
      apt:
        upgrade: dist
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      register: apt_update

    - name: Update package cache and patch SUSE/openSUSE
      zypper:
        name: '*'
        state: latest
      when: ansible_os_family == "Suse"
      register: zypper_update

    - name: Display patching results for RedHat family
      debug:
        msg: "{{ yum_update }}"
      when: ansible_os_family == "RedHat"

    - name: Display patching results for Debian family
      debug:
        msg: "{{ apt_update }}"
      when: ansible_os_family == "Debian"

    - name: Display patching results for SUSE family
      debug:
        msg: "{{ zypper_update }}"
      when: ansible_os_family == "Suse"

    - name: Check if reboot is required (Debian/Ubuntu)
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_os_family == "Debian"

    - name: Reboot system if patches require it
      reboot:
        msg: "System is being rebooted after patching"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: patch_reboot | bool or (ansible_os_family == "Debian" and reboot_required.stat.exists)

    - name: Display final status
      debug:
        msg: "System {{ inventory_hostname }} patching completed successfully"
